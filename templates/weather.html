<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wetter Radar - Aviation Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --bg-primary: #000;
            --card-bg: rgba(0, 20, 40, 0.8);
            --text-primary: #0ff;
            --border-color: #0ff;
            --border-glow: rgba(0, 255, 255, 0.3);
            --grid-color: rgba(0, 255, 255, 0.03);
            --scanline-color: rgba(0, 255, 255, 0.03);
            --button-bg: rgba(0, 255, 255, 0.1);
            --button-hover: rgba(0, 255, 255, 0.3);
        }
        body.light-mode {
            --bg-primary: #e8edf5;
            --card-bg: rgba(255, 255, 255, 0.92);
            --text-primary: #1a365d;
            --border-color: #3182ce;
            --border-glow: rgba(49, 130, 206, 0.3);
            --grid-color: rgba(49, 130, 206, 0.05);
            --scanline-color: transparent;
            --button-bg: rgba(49, 130, 206, 0.1);
            --button-hover: rgba(49, 130, 206, 0.25);
        }

        .material-symbols-outlined {
            font-variation-settings:
                    "FILL" 1,
                    "wght" 700,
                    "GRAD" 0,
                    "opsz" 48;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* Animated Background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent 50%, var(--scanline-color) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            animation: scan 8s linear infinite;
            z-index: 999;
        }

        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0.4rem;
            gap: 0.4rem;
        }

        header {
            text-align: center;
            padding: 0.3rem;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            box-shadow: 0 0 20px var(--border-glow);
            transition: all 0.4s ease;
        }

        header h1 {
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-primary);
            text-shadow: 0 0 10px var(--border-glow);
        }

        #map {
            flex: 1;
            width: 100%;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            box-shadow: 0 0 20px var(--border-glow);
            transition: border-color 0.4s ease;
        }

        nav {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.3rem;
        }

        nav button {
            padding: 0.6rem 0.3rem;
            min-height: 44px;
            font-family: 'Orbitron', monospace;
            font-size: 0.65rem;
            font-weight: 700;
            background: var(--button-bg);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px var(--border-glow);
            touch-action: manipulation;
        }

        nav button:hover {
            background: var(--button-hover);
            box-shadow: 0 0 20px var(--border-glow);
            transform: translateY(-2px);
        }

        nav button:active {
            transform: translateY(0);
        }

        .legend {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.5rem;
            border-radius: 6px;
            font-size: 0.7rem;
            z-index: 1000;
            box-shadow: 0 0 15px var(--border-glow);
            transition: all 0.4s ease;
        }

        .legend h3 {
            color: var(--text-primary);
            margin-bottom: 0.3rem;
            font-size: 0.6rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 0.2rem;
            font-size: 0.55rem;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            margin-right: 0.35rem;
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* Radar Animation Controls */
        #radar-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.6rem;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--border-glow);
            transition: all 0.4s ease;
        }

        #radar-time {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-primary);
            min-width: 3rem;
        }

        .radar-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            font-size: 0.6rem;
            font-weight: 700;
            min-width: 4rem;
            text-align: center;
        }

        .badge-past {
            background: rgba(0, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .badge-forecast {
            background: rgba(255, 165, 0, 0.15);
            color: #fa0;
            border: 1px solid #fa0;
        }

        #radar-progress {
            flex: 1;
            height: 5px;
            background: rgba(0, 255, 255, 0.15);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        #radar-progress-bar {
            height: 100%;
            background: var(--text-primary);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        #btn-play-pause {
            flex: none;
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
            min-width: 2rem;
            min-height: auto;
        }
    </style>
</head>
<body>
    <script>(function(){if(localStorage.getItem('theme')==='light')document.body.classList.add('light-mode');})();</script>
    <div class="bg-grid"></div>
    <div class="scanline"></div>

    <div class="container">
        <header>
            <h1>
                <span class="material-symbols-outlined" style="font-size: 1.2rem; vertical-align: middle; color: #0ff;">
                    thunderstorm
                </span>
                WETTER RADAR
            </h1>
        </header>

        <div id="map">
            <div class="legend">
                <h3>NIEDERSCHLAG</h3>
                <div class="legend-item">
                    <div class="legend-color" style="background: #0099ff;"></div>
                    Leicht
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #00ff00;"></div>
                    Mäßig
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ffff00;"></div>
                    Stark
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff0000;"></div>
                    Gewitter
                </div>
            </div>
        </div>

        <!-- Radar Animation Controls -->
        <div id="radar-controls">
            <div id="radar-time">--:--</div>
            <div id="radar-badge" class="radar-badge badge-past">LADEN...</div>
            <div id="radar-progress"><div id="radar-progress-bar" style="width:0%"></div></div>
            <button id="btn-play-pause" onclick="togglePlayPause()">⏸</button>
        </div>

        <nav>
            <button onclick="location.href='/'">HOME</button>
            <button onclick="location.href='/weather'">WETTER</button>
            <button onclick="location.href='/flights'">FLÜGE</button>
            <button onclick="location.reload()">REFRESH</button>
        </nav>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map with coordinates from Flask
        const homeLat = parseFloat("{{ lat }}");
        const homeLon = parseFloat("{{ lon }}");
        const map = L.map('map').setView([homeLat, homeLon], 9);

        // Tile layer depending on theme
        const isLight = document.body.classList.contains('light-mode');
        const tileUrl = isLight
            ? 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
            : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
        L.tileLayer(tileUrl, {
            attribution: '© OpenStreetMap, © CartoDB',
            maxZoom: 19
        }).addTo(map);

        // Custom home marker with cyan style
        const homeIcon = L.divIcon({
            html: `
                <span class="material-symbols-outlined"
                    style="
                        font-size: 34px;
                        color: #0ff;
                        filter:
                            drop-shadow(0 0 4px #0ff)
                            drop-shadow(0 0 8px #0ff);
                    ">
                    location_on
                </span>
            `,

            className: 'custom-marker',
            iconSize: [24, 24],
            iconAnchor: [12, 24]
        });

        L.marker([homeLat, homeLon], { icon: homeIcon }).addTo(map)
            .bindPopup('<b style="color: #0ff;">HOME BASE</b>');

        // Radar Animation
        let radarLayer = null;
        let allFrames = [];
        let currentFrameIndex = 0;
        let isPlaying = true;
        let animationInterval = null;

        async function loadRadarData() {
            try {
                const resp = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const data = await resp.json();

                const past = (data.radar?.past || []).map(f => ({ ...f, type: 'past' }));
                const nowcast = (data.radar?.nowcast || []).map(f => ({ ...f, type: 'nowcast' }));
                allFrames = [...past, ...nowcast];

                if (allFrames.length > 0) {
                    // Start playback from latest past frame
                    currentFrameIndex = Math.max(0, past.length - 1);
                    if (isPlaying) startAnimation();
                    else showFrame(currentFrameIndex);
                }
            } catch (error) {
                console.error('Radar loading error:', error);
                document.getElementById('radar-badge').textContent = 'FEHLER';
            }
        }

        function showFrame(index) {
            if (!allFrames[index]) return;
            const frame = allFrames[index];

            if (radarLayer) map.removeLayer(radarLayer);

            radarLayer = L.tileLayer(
                `https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`,
                {
                    opacity: frame.type === 'nowcast' ? 0.5 : 0.7,
                    maxNativeZoom: 7,
                    maxZoom: 19
                }
            ).addTo(map);

            // Update time display
            const time = new Date(frame.time * 1000);
            document.getElementById('radar-time').textContent =
                time.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

            // Update badge
            const badge = document.getElementById('radar-badge');
            if (frame.type === 'nowcast') {
                badge.textContent = 'PROGNOSE';
                badge.className = 'radar-badge badge-forecast';
            } else if (index === allFrames.findLastIndex(f => f.type === 'past')) {
                badge.textContent = 'JETZT';
                badge.className = 'radar-badge badge-past';
            } else {
                badge.textContent = 'RADAR';
                badge.className = 'radar-badge badge-past';
            }

            // Update progress bar
            document.getElementById('radar-progress-bar').style.width =
                ((index + 1) / allFrames.length * 100) + '%';
        }

        function startAnimation() {
            if (animationInterval) clearInterval(animationInterval);
            showFrame(currentFrameIndex);
            animationInterval = setInterval(() => {
                currentFrameIndex = (currentFrameIndex + 1) % allFrames.length;
                showFrame(currentFrameIndex);
            }, 700);
        }

        function togglePlayPause() {
            isPlaying = !isPlaying;
            document.getElementById('btn-play-pause').textContent = isPlaying ? '⏸' : '▶';
            if (isPlaying) {
                startAnimation();
            } else {
                clearInterval(animationInterval);
            }
        }

        // Load radar on startup
        loadRadarData();

        // Reload fresh data every 5 minutes
        setInterval(() => { loadRadarData(); }, 300000);
    </script>
</body>
</html>
